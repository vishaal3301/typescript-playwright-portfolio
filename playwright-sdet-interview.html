<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playwright SDET — JS Interview Prep</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --panel: #0f1525;
    --border: #1e2d4a;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --code-bg: #060b14;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 40px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  h1 {
    font-size: clamp(18px, 2.5vw, 26px);
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent); }

  .badge {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 8px;
    padding: 24px 48px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active {
    background: rgba(0,212,255,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Progress */
  .progress-bar-wrap {
    position: relative;
    z-index: 10;
    padding: 0 48px;
    margin-top: 8px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Main layout */
  main {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    height: calc(100vh - 185px);
  }

  /* Question list */
  .q-list {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .q-item {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(30,45,74,0.5);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .q-item:hover { background: rgba(0,212,255,0.04); }
  .q-item.active { background: rgba(0,212,255,0.08); border-left: 3px solid var(--accent); }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding-top: 2px;
    min-width: 24px;
  }

  .q-title {
    font-size: 13px;
    line-height: 1.4;
    font-weight: 700;
    flex: 1;
  }

  .q-difficulty {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .diff-easy { background: rgba(16,185,129,0.15); color: var(--green); }
  .diff-medium { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .diff-hard { background: rgba(239,68,68,0.15); color: var(--red); }

  /* Detail panel */
  .q-detail {
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    padding: 36px 44px;
  }

  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .detail-title {
    font-size: clamp(18px, 2vw, 24px);
    font-weight: 800;
    line-height: 1.3;
    flex: 1;
  }

  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 6px;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: #a78bfa;
    font-family: 'JetBrains Mono', monospace;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .question-text {
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 10px;
    padding: 18px 20px;
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 28px;
    color: #cbd5e1;
  }

  /* Code block */
  .code-wrap {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
  }

  .code-lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  pre {
    padding: 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: #94a3b8;
  }

  .kw { color: #7c3aed; font-weight: 600; }
  .fn { color: #38bdf8; }
  .str { color: #34d399; }
  .cm { color: #475569; font-style: italic; }
  .num { color: #fb923c; }
  .cls { color: #f59e0b; }

  /* Reveal solution button */
  .reveal-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(124,58,237,0.15));
    border: 1px solid rgba(0,212,255,0.4);
    color: var(--accent);
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 24px;
  }
  .reveal-btn:hover {
    background: rgba(0,212,255,0.2);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,212,255,0.15);
  }

  .solution-block { display: none; }
  .solution-block.visible { display: block; }

  .explanation {
    background: rgba(16,185,129,0.06);
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 10px;
    padding: 18px 20px;
    font-size: 14px;
    line-height: 1.75;
    color: #a7f3d0;
    margin-bottom: 20px;
  }

  .explanation strong { color: var(--green); }

  .key-points {
    background: rgba(15,21,37,0.8);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 28px;
  }

  .key-points h4 {
    font-size: 13px;
    color: var(--yellow);
    margin-bottom: 12px;
    font-weight: 700;
  }

  .key-points ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .key-points li {
    font-size: 13px;
    color: #94a3b8;
    padding-left: 18px;
    position: relative;
    line-height: 1.5;
    font-family: 'JetBrains Mono', monospace;
  }

  .key-points li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
  }

  /* Nav */
  .nav-btns {
    display: flex;
    gap: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }

  .nav-btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    header { padding: 24px 20px; }
    .tabs { padding: 16px 20px; }
    .progress-bar-wrap { padding: 0 20px; }
    main { grid-template-columns: 1fr; height: auto; }
    .q-list { max-height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
    .q-detail { padding: 24px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎭</div>
    <div>
      <h1>Playwright SDET — <span>JS Interview</span></h1>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace;">4 Years Experience · 20 Programs</div>
    </div>
  </div>
  <div class="badge">SDET · 4 YOE</div>
</header>

<div class="tabs" id="tabs"></div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="prog-label">Question 1 of 20</span>
    <span id="prog-pct">5%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:5%"></div></div>
</div>

<main>
  <div class="q-list" id="qList"></div>
  <div class="q-detail" id="qDetail"></div>
</main>

<script>
const questions = [
  {
    category: "Core JS",
    title: "Closure & Counter Factory",
    difficulty: "easy",
    tags: ["closures","factory","scope"],
    question: "Write a makeCounter() factory function that returns an object with increment, decrement, and reset methods using closures. Explain how this pattern is used in Playwright test helpers.",
    code: `<span class="cm">// Q1: Closure-based Counter Factory</span>
<span class="kw">function</span> <span class="fn">makeCounter</span>(initialValue = <span class="num">0</span>) {
  <span class="kw">let</span> count = initialValue;

  <span class="kw">return</span> {
    <span class="fn">increment</span>: () => ++count,
    <span class="fn">decrement</span>: () => --count,
    <span class="fn">reset</span>:     () => { count = initialValue; <span class="kw">return</span> count; },
    <span class="fn">value</span>:     () => count
  };
}

<span class="cm">// Playwright Usage: Track retry attempts</span>
<span class="kw">const</span> retryCounter = <span class="fn">makeCounter</span>();

<span class="fn">test</span>(<span class="str">'Login with retry'</span>, <span class="kw">async</span> ({ page }) => {
  <span class="kw">while</span> (retryCounter.<span class="fn">value</span>() < <span class="num">3</span>) {
    <span class="kw">try</span> {
      <span class="kw">await</span> page.<span class="fn">goto</span>(<span class="str">'/login'</span>);
      <span class="kw">await</span> page.<span class="fn">click</span>(<span class="str">'#submit'</span>);
      <span class="kw">break</span>;
    } <span class="kw">catch</span> (e) {
      retryCounter.<span class="fn">increment</span>();
    }
  }
});`,
    explanation: `<strong>Closures</strong> capture variables in their enclosing scope. <code>count</code> is private — only accessible via the returned methods. In Playwright, this pattern creates stateful helpers (retry counters, assertion trackers) that persist across async test steps without polluting global state.`,
    keyPoints: [
      "count variable is private — not accessible externally",
      "Each makeCounter() call creates its own independent scope",
      "Arrow functions inherit `this` from enclosing context",
      "Used in Playwright for: retries, counters, ID generators"
    ]
  },
  {
    category: "Core JS",
    title: "Promise.all vs Promise.allSettled",
    difficulty: "medium",
    tags: ["promises","async","parallel"],
    question: "Write a function that navigates to 3 URLs in parallel using both Promise.all and Promise.allSettled. Explain when to use each in Playwright tests and handle failures gracefully.",
    code: `<span class="cm">// Q2: Parallel navigation with Promise variants</span>
<span class="kw">async function</span> <span class="fn">navigateAll</span>(page, urls) {
  <span class="cm">// Promise.all — fails fast if ANY url throws</span>
  <span class="kw">try</span> {
    <span class="kw">const</span> results = <span class="kw">await</span> <span class="cls">Promise</span>.<span class="fn">all</span>(
      urls.<span class="fn">map</span>(url => page.<span class="fn">goto</span>(url))
    );
    console.<span class="fn">log</span>(<span class="str">'All navigations succeeded'</span>, results);
  } <span class="kw">catch</span> (err) {
    console.<span class="fn">error</span>(<span class="str">'One failed, all aborted:'</span>, err);
  }
}

<span class="kw">async function</span> <span class="fn">navigateAllSettled</span>(pages, urls) {
  <span class="cm">// Promise.allSettled — waits for ALL, collects outcomes</span>
  <span class="kw">const</span> results = <span class="kw">await</span> <span class="cls">Promise</span>.<span class="fn">allSettled</span>(
    urls.<span class="fn">map</span>((url, i) => pages[i].<span class="fn">goto</span>(url))
  );

  results.<span class="fn">forEach</span>((result, i) => {
    <span class="kw">if</span> (result.status === <span class="str">'fulfilled'</span>) {
      console.<span class="fn">log</span>(<span class="str">\`✅ \${urls[i]}\`</span>, result.value);
    } <span class="kw">else</span> {
      console.<span class="fn">error</span>(<span class="str">\`❌ \${urls[i]}\`</span>, result.reason);
    }
  });

  <span class="cm">// Report: how many failed?</span>
  <span class="kw">const</span> failed = results.<span class="fn">filter</span>(r => r.status === <span class="str">'rejected'</span>);
  <span class="kw">return</span> { total: urls.length, failed: failed.length };
}`,
    explanation: `<strong>Promise.all</strong> is "all or nothing" — ideal when all tasks MUST succeed (e.g., setup fixtures). <strong>Promise.allSettled</strong> collects all results regardless of failures — perfect for bulk health checks or smoke tests where partial success is reportable.`,
    keyPoints: [
      "Promise.all rejects immediately on first failure",
      "Promise.allSettled always resolves with {status, value/reason}",
      "In Playwright: use allSettled for multi-page smoke tests",
      "Promise.race — first to settle wins; useful for timeouts"
    ]
  },
  {
    category: "Core JS",
    title: "Debounce Implementation",
    difficulty: "medium",
    tags: ["debounce","timers","closures"],
    question: "Implement a debounce() function from scratch. Then explain a scenario where you'd use debouncing in Playwright test utilities (e.g., waiting for network idle after user input).",
    code: `<span class="cm">// Q3: Debounce from scratch</span>
<span class="kw">function</span> <span class="fn">debounce</span>(fn, delay) {
  <span class="kw">let</span> timerId = <span class="kw">null</span>;

  <span class="kw">return function</span>(...args) {
    <span class="fn">clearTimeout</span>(timerId); <span class="cm">// reset on each call</span>
    timerId = <span class="fn">setTimeout</span>(() => {
      fn.<span class="fn">apply</span>(<span class="kw">this</span>, args);
    }, delay);
  };
}

<span class="cm">// Playwright: debounce a "wait for network idle" helper</span>
<span class="kw">const</span> waitForNetworkIdle = <span class="fn">debounce</span>(<span class="kw">async</span> (page) => {
  <span class="kw">await</span> page.<span class="fn">waitForLoadState</span>(<span class="str">'networkidle'</span>);
  console.<span class="fn">log</span>(<span class="str">'Network settled'</span>);
}, <span class="num">300</span>);

<span class="cm">// Also useful for search-as-you-type test scenarios:</span>
<span class="fn">test</span>(<span class="str">'Search debounce'</span>, <span class="kw">async</span> ({ page }) => {
  <span class="kw">const</span> searchBox = page.<span class="fn">locator</span>(<span class="str">'#search'</span>);
  <span class="kw">await</span> searchBox.<span class="fn">type</span>(<span class="str">'playwright'</span>, { delay: <span class="num">50</span> });
  <span class="cm">// Wait for debounced API call to settle</span>
  <span class="kw">await</span> page.<span class="fn">waitForResponse</span>(r =>
    r.<span class="fn">url</span>().<span class="fn">includes</span>(<span class="str">'/search'</span>) && r.<span class="fn">status</span>() === <span class="num">200</span>
  );
});`,
    explanation: `<strong>Debounce</strong> delays execution until a burst of calls stops. Each new call resets the timer. In testing, this mimics real user typing behavior and avoids redundant API polling when watching for state changes after rapid DOM updates.`,
    keyPoints: [
      "clearTimeout on every call — only last invocation fires",
      "Throttle is different: executes at fixed intervals regardless",
      "Playwright's waitForResponse() already handles debounced APIs",
      "Use leading:true variant to fire on first call, not last"
    ]
  },
  {
    category: "Core JS",
    title: "Deep Clone Without structuredClone",
    difficulty: "medium",
    tags: ["objects","recursion","cloning"],
    question: "Write a deepClone() function without using structuredClone or JSON.parse/stringify. Handle nested objects, arrays, null, and Date objects.",
    code: `<span class="cm">// Q4: Deep clone handling edge cases</span>
<span class="kw">function</span> <span class="fn">deepClone</span>(value) {
  <span class="kw">if</span> (value === <span class="kw">null</span> || <span class="kw">typeof</span> value !== <span class="str">'object'</span>) {
    <span class="kw">return</span> value; <span class="cm">// primitive or null</span>
  }

  <span class="kw">if</span> (value <span class="kw">instanceof</span> <span class="cls">Date</span>) {
    <span class="kw">return new</span> <span class="cls">Date</span>(value.getTime());
  }

  <span class="kw">if</span> (<span class="cls">Array</span>.<span class="fn">isArray</span>(value)) {
    <span class="kw">return</span> value.<span class="fn">map</span>(item => <span class="fn">deepClone</span>(item));
  }

  <span class="cm">// Plain object</span>
  <span class="kw">const</span> cloned = {};
  <span class="kw">for</span> (<span class="kw">const</span> key <span class="kw">of</span> <span class="cls">Object</span>.<span class="fn">keys</span>(value)) {
    cloned[key] = <span class="fn">deepClone</span>(value[key]);
  }
  <span class="kw">return</span> cloned;
}

<span class="cm">// Playwright use: clone config/fixture data safely</span>
<span class="kw">const</span> baseTestData = {
  user: { name: <span class="str">'Alice'</span>, roles: [<span class="str">'admin'</span>] },
  created: <span class="kw">new</span> <span class="cls">Date</span>()
};

<span class="fn">test</span>(<span class="str">'Isolated test data'</span>, <span class="kw">async</span> ({ page }) => {
  <span class="kw">const</span> testData = <span class="fn">deepClone</span>(baseTestData);
  testData.user.roles.<span class="fn">push</span>(<span class="str">'editor'</span>); <span class="cm">// safe, won't mutate base</span>
  <span class="kw">await</span> page.<span class="fn">evaluate</span>(data => <span class="fn">setupUser</span>(data), testData);
});`,
    explanation: `<strong>Deep cloning</strong> prevents test data pollution between test cases. Mutating shared fixtures is a top cause of flaky tests. By deep-cloning base data, each test gets an isolated copy — critical in parallel Playwright test runs.`,
    keyPoints: [
      "JSON.parse/stringify breaks: Date→string, undefined dropped, functions lost",
      "structuredClone() is modern native but not available in old Node",
      "Circular references need a WeakMap to prevent infinite recursion",
      "In Playwright: use deep clone for test fixtures and page state"
    ]
  },
  {
    category: "Async/Await",
    title: "Sequential vs Parallel Await",
    difficulty: "medium",
    tags: ["async","performance","playwright"],
    question: "Compare sequential await vs Promise.all for filling a form with 5 fields. Write both versions and measure the performance difference.",
    code: `<span class="cm">// Q5: Sequential vs Parallel fills</span>

<span class="cm">// ❌ Sequential (slower — ~5 × RTT)</span>
<span class="kw">async function</span> <span class="fn">fillFormSequential</span>(page) {
  <span class="kw">const</span> start = <span class="cls">Date</span>.<span class="fn">now</span>();

  <span class="kw">await</span> page.<span class="fn">fill</span>(<span class="str">'#city'</span>,      <span class="str">'NYC'</span>);
  console.<span class="fn">log</span>(<span class="str">'Sequential:'</span>, <span class="cls">Date</span>.<span class="fn">now</span>() - start, <span class="str">'ms'</span>);
}

<span class="cm">// ✅ Parallel (faster — 1 × RTT)</span>
<span class="kw">async function</span> <span class="fn">fillFormParallel</span>(page) {
  <span class="kw">const</span> start = <span class="cls">Date</span>.<span class="fn">now</span>();
  <span class="kw">await</span> <span class="cls">Promise</span>.<span class="fn">all</span>([

    page.<span class="fn">fill</span>(<span class="str">'#lastName'</span>,  <span class="str">'Smith'</span>),
    page.<span class="fn">fill</span>(<span class="str">'#email'</span>,     <span class="str">'alice@test.com'</span>),

}

    category: "Async/Await",
    title: "Retry with Exponential Backoff",
    difficulty: "hard",
    tags: ["retry","async","error-handling"],
    question: "Write a retryWithBackoff() utility that retries a flaky async function with exponential backoff and jitter. Use this to wrap Playwright assertions.",
    code: `<span class="cm">// Q6: Exponential backoff with jitter</span>
<span class="kw">async function</span> <span class="fn">retryWithBackoff</span>(fn, options = {}) {
  <span class="kw">const</span> {
    maxAttempts = <span class="num">3</span>,
    baseDelay   = <span class="num">500</span>,
    maxDelay    = <span class="num">10000</span>,
    jitter      = <span class="kw">true</span>
  } = options;

  <span class="kw">let</span> lastError;
  <span class="kw">for</span> (<span class="kw">let</span> attempt = <span class="num">0</span>; attempt < maxAttempts; attempt++) {
    <span class="kw">try</span> {
      <span class="kw">return await</span> <span class="fn">fn</span>(attempt);
    } <span class="kw">catch</span> (err) {
      lastError = err;
      <span class="kw">if</span> (attempt === maxAttempts - <span class="num">1</span>) <span class="kw">break</span>;

      <span class="kw">let</span> delay = <span class="cls">Math</span>.<span class="fn">min</span>(baseDelay * <span class="num">2</span> ** attempt, maxDelay);
      <span class="kw">if</span> (jitter) delay *= (<span class="num">0.5</span> + <span class="cls">Math</span>.<span class="fn">random</span>() * <span class="num">0.5</span>);

      console.<span class="fn">warn</span>(<span class="str">\`Attempt \${attempt+1} failed. Retrying in \${~~delay}ms\`</span>);
      <span class="kw">await new</span> <span class="cls">Promise</span>(res => <span class="fn">setTimeout</span>(res, delay));
    }
  }
  <span class="kw">throw</span> lastError;
}

<span class="cm">// Playwright usage: wrap flaky API wait</span>
<span class="fn">test</span>(<span class="str">'Dashboard loads data'</span>, <span class="kw">async</span> ({ page }) => {
  <span class="kw">await</span> <span class="fn">retryWithBackoff</span>(
    <span class="kw">async</span> (attempt) => {
      console.<span class="fn">log</span>(<span class="str">\`Checking dashboard (attempt \${attempt})\`</span>);
      <span class="kw">await</span> expect(page.<span class="fn">locator</span>(<span class="str">'.data-table'</span>)).<span class="fn">toBeVisible</span>();
    },
    { maxAttempts: <span class="num">4</span>, baseDelay: <span class="num">1000</span> }
  );
});`,
    explanation: `<strong>Exponential backoff</strong> doubles the wait time after each failure (500ms → 1s → 2s → 4s). <strong>Jitter</strong> adds randomness to prevent thundering herd — multiple retrying tests don't all hit the server at the same moment. Playwright has built-in retries but this utility is useful for custom polling logic.`,

    code: `<span class="cm">// Q9: Custom flatMap + Playwright result parsing</span>

    code: `<span class="cm">// Q10: groupBy using reduce</span>
<span class="kw">function</span> <span class="fn">groupBy</span>(array, keyFn) {
  <span class="kw">return</span> array.<span class="fn">reduce</span>((groups, item) => {
    <span class="kw">const</span> key = <span class="fn">keyFn</span>(item);
    <span class="kw">if</span> (!groups[key]) groups[key] = [];
    groups[key].<span class="fn">push</span>(item);
    <span class="kw">return</span> groups;
  }, {});
}

<span class="kw">const</span> results = [

    code: `<span class="cm">// Q15: LRU Cache implementation</span>
<span class="kw">class</span> <span class="cls">LRUCache</span> {
  <span class="fn">constructor</span>(capacity) {
    <span class="kw">this</span>.capacity = capacity;
    <span class="kw">this</span>.cache = <span class="kw">new</span> <span class="cls">Map</span>(); <span class="cm">// Map preserves insertion order</span>
  }

  <span class="fn">get</span>(key) {
    <span class="kw">if</span> (!<span class="kw">this</span>.cache.<span class="fn">has</span>(key)) <span class="kw">return</span> -<span class="num">1</span>;
    <span class="cm">// Move to end (most recently used)</span>
    <span class="kw">const</span> value = <span class="kw">this</span>.cache.<span class="fn">get</span>(key);
    <span class="kw">this</span>.cache.<span class="fn">delete</span>(key);
    <span class="kw">this</span>.cache.<span class="fn">set</span>(key, value);
    <span class="kw">return</span> value;
  }

  <span class="fn">put</span>(key, value) {
    <span class="kw">if</span> (<span class="kw">this</span>.cache.<span class="fn">has</span>(key)) <span class="kw">this</span>.cache.<span class="fn">delete</span>(key);
    <span class="kw">else if</span> (<span class="kw">this</span>.cache.size >= <span class="kw">this</span>.capacity) {
      <span class="cm">// Evict LRU: first key in Map</span>
      <span class="kw">const</span> lruKey = <span class="kw">this</span>.cache.keys().<span class="fn">next</span>().value;
      <span class="kw">this</span>.cache.<span class="fn">delete</span>(lruKey);
    }
    <span class="kw">this</span>.cache.<span class="fn">set</span>(key, value);
  }

  <span class="fn">size</span>() { <span class="kw">return this</span>.cache.size; }
}

    code: `<span class="cm">// Q16: EventEmitter implementation</span>
<span class="kw">class</span> <span class="cls">EventEmitter</span> {
  <span class="fn">constructor</span>() {
    <span class="kw">this</span>._events = <span class="kw">new</span> <span class="cls">Map</span>();
  }

  <span class="fn">on</span>(event, listener) {
    <span class="kw">if</span> (!<span class="kw">this</span>._events.<span class="fn">has</span>(event)) {
      <span class="kw">this</span>._events.<span class="fn">set</span>(event, []);
    }
    <span class="kw">this</span>._events.<span class="fn">get</span>(event).<span class="fn">push</span>(listener);
    <span class="kw">return this</span>; <span class="cm">// chainable</span>
  }

  <span class="fn">off</span>(event, listener) {
    <span class="kw">const</span> listeners = <span class="kw">this</span>._events.<span class="fn">get</span>(event) ?? [];
    <span class="kw">this</span>._events.<span class="fn">set</span>(event,
      listeners.<span class="fn">filter</span>(l => l !== listener)
    );
    <span class="kw">return this</span>;
  }

  <span class="fn">once</span>(event, listener) {
    <span class="kw">const</span> wrapper = (...args) => {
      listener(...args);
      <span class="kw">this</span>.<span class="fn">off</span>(event, wrapper); <span class="cm">// auto-remove</span>
    };
    <span class="kw">return this</span>.<span class="fn">on</span>(event, wrapper);
  }

  <span class="fn">emit</span>(event, ...args) {
    (<span class="kw">this</span>._events.<span class="fn">get</span>(event) ?? [])
      .<span class="fn">forEach</span>(fn => <span class="fn">fn</span>(...args));
    <span class="kw">return this</span>;
  }
}

    question: "Implement pipe() and compose() for function composition. Build a Playwright test data transformation pipeline using these utilities.",
    code: `<span class="cm">// Q20: pipe() and compose() implementation</span>

<span class="cm">// pipe: left → right (f, then g, then h)</span>
<span class="kw">const</span> pipe = (...fns) => x => fns.<span class="fn">reduce</span>((v, f) => <span class="fn">f</span>(v), x);

<span class="cm">// compose: right → left (mathematical convention)</span>
<span class="kw">const</span> compose = (...fns) => x => fns.<span class="fn">reduceRight</span>((v, f) => <span class="fn">f</span>(v), x);

<span class="cm">// Test data transformations</span>
<span class="kw">const</span> trimFields     = obj => <span class="cls">Object</span>.<span class="fn">fromEntries</span>(
  <span class="cls">Object</span>.<span class="fn">entries</span>(obj).<span class="fn">map</span>(([k, v]) => [k, <span class="kw">typeof</span> v === <span class="str">'string'</span> ? v.<span class="fn">trim</span>() : v])
);
<span class="kw">const</span> lowercaseEmail = obj => ({ ...obj, email: obj.email?.<span class="fn">toLowerCase</span>() });
<span class="kw">const</span> addDefaults    = obj => ({ active: <span class="kw">true</span>, role: <span class="str">'viewer'</span>, ...obj });
<span class="kw">const</span> validateUser   = obj => {
  <span class="kw">if</span> (!obj.email?.<span class="fn">includes</span>(<span class="str">'@'</span>)) <span class="kw">throw new</span> <span class="cls">Error</span>(<span class="str">'Invalid email'</span>);
  <span class="kw">return</span> obj;
};

<span class="kw">const</span> processUser = <span class="fn">pipe</span>(
  trimFields, lowercaseEmail, addDefaults, validateUser
);

<span class="cm">// Playwright: process raw form data before seeding</span>
<span class="fn">test</span>(<span class="str">'Form submission normalizes data'</span>, <span class="kw">async</span> ({ page, request }) => {
  <span class="kw">const</span> rawInput = { name: <span class="str">'  Alice  '</span>, email: <span class="str">'ALICE@TEST.COM'</span> };
  <span class="kw">const</span> processed = <span class="fn">processUser</span>(rawInput);
  <span class="cm">// { name: 'Alice', email: 'alice@test.com', active: true, role: 'viewer' }</span>

  <span class="kw">await</span> request.<span class="fn">post</span>(<span class="str">'/api/users'</span>, { data: processed });
  <span class="kw">await</span> page.<span class="fn">goto</span>(<span class="str">'/users'</span>);
  <span class="kw">await</span> <span class="fn">expect</span>(page.<span class="fn">locator</span>(<span class="str">\`text=\${processed.name}\`</span>)).<span class="fn">toBeVisible</span>();
});`,
    explanation: `<strong>pipe()</strong> threads a value through a sequence of functions left-to-right — each function receives the previous output. This builds declarative data transformation pipelines. In Playwright test suites, this pattern cleanly normalizes and validates test data before API seeding.`,
    keyPoints: [
      "pipe = reduce with initial value; compose = reduceRight",
      "Each function must: accept one arg, return transformed value",
      "validateUser throws — pipe propagates errors naturally",
      "Async pipe: use async reduce with await for async transforms"
    ]
  }
];

const categories = ["All", ...new Set(questions.map(q => q.category))];

let activeCategory = "All";
let activeIndex = 0;
let revealedSet = new Set();

function filteredQuestions() {
  return activeCategory === "All"
    ? questions
    : questions.filter(q => q.category === activeCategory);
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = categories.map(cat => `
    <button class="tab ${cat === activeCategory ? 'active' : ''}"
      onclick="setCategory('${cat}')">${cat}</button>
  `).join('');
}

function renderList() {
  const list = document.getElementById('qList');
  const fq = filteredQuestions();
  list.innerHTML = fq.map((q, i) => `
    <div class="q-item ${i === activeIndex ? 'active' : ''}" onclick="selectQ(${i})">
      <div class="q-num">Q${questions.indexOf(q)+1}</div>
      <div class="q-title">${q.title}</div>
      <div class="q-difficulty diff-${q.difficulty}">${q.difficulty}</div>
    </div>
  `).join('');
  updateProgress();
}

function renderDetail() {
  const fq = filteredQuestions();
  const q = fq[activeIndex];
  if (!q) return;
  const qIndex = questions.indexOf(q);
  const revealed = revealedSet.has(qIndex);
  const detail = document.getElementById('qDetail');
  detail.innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${q.title}</div>
      <div class="q-difficulty diff-${q.difficulty}">${q.difficulty}</div>
    </div>
    <div class="tags">
      ${q.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      <span class="tag">${q.category}</span>
    </div>
    <div class="section-label">Question</div>
    <div class="question-text">${q.question}</div>
    <div class="section-label">Your Answer / Solution Code</div>
    <div class="code-wrap">
      <div class="code-header">
        <span class="code-lang">JavaScript</span>
        <button class="copy-btn" onclick="copyCode(${qIndex})">Copy</button>
      </div>
      <pre id="code-${qIndex}">${q.code}</pre>
    </div>
    ${!revealed ? `
      <button class="reveal-btn" onclick="revealSolution(${qIndex})">
        ▶ Reveal Explanation & Key Points
      </button>
    ` : ''}
    <div class="solution-block ${revealed ? 'visible' : ''}" id="sol-${qIndex}">
      <div class="section-label">Explanation</div>
      <div class="explanation">${q.explanation}</div>
      <div class="key-points">
        <h4>⚡ Key Interview Points</h4>
        <ul>${q.keyPoints.map(p => `<li>${p}</li>`).join('')}</ul>
      </div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="prevQ()" ${activeIndex === 0 ? 'disabled' : ''}>← Prev</button>
      <button class="nav-btn" onclick="nextQ()" ${activeIndex === fq.length-1 ? 'disabled' : ''}>Next →</button>
    </div>
  `;
}

function updateProgress() {
  const fq = filteredQuestions();
  const total = fq.length;
  const current = activeIndex + 1;
  const pct = Math.round((current / total) * 100);
  document.getElementById('prog-label').textContent = `Question ${current} of ${total}`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-fill').style.width = `${pct}%`;
}

function setCategory(cat) {
  activeCategory = cat;
  activeIndex = 0;
  renderTabs();
  renderList();
  renderDetail();
}

function selectQ(i) {
  activeIndex = i;
  renderList();
  renderDetail();
}

function prevQ() {
  if (activeIndex > 0) { activeIndex--; renderList(); renderDetail(); }
}

function nextQ() {
  const fq = filteredQuestions();
  if (activeIndex < fq.length - 1) { activeIndex++; renderList(); renderDetail(); }
}

function revealSolution(qIndex) {
  revealedSet.add(qIndex);
  renderDetail();
}

function copyCode(qIndex) {
  const el = document.getElementById(`code-${qIndex}`);
  const text = el ? el.innerText : '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500); }
  });
}

// Init
renderTabs();
renderList();
renderDetail();
</script>
</body>
